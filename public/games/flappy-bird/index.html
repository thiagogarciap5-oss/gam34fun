<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #70c5ce; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; overflow: hidden; }
        h1 { color: #fff; text-shadow: 2px 2px #000; margin-bottom: 10px; font-size: 28px; }
        #score { font-size: 48px; color: #fff; text-shadow: 2px 2px #000; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); z-index: 10; }
        canvas { border-radius: 8px; cursor: pointer; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); padding: 40px 60px; border-radius: 16px; text-align: center; display: none; z-index: 100; }
        #gameOver h2 { color: #ffd700; font-size: 36px; margin-bottom: 15px; }
        #gameOver p { color: #fff; font-size: 24px; margin-bottom: 25px; }
        button { padding: 15px 40px; font-size: 20px; background: #ffd700; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ffb700; }
        .instructions { color: #fff; text-shadow: 1px 1px #000; margin-top: 15px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>🐦 FLAPPY BIRD</h1>
    <div id="score">0</div>
    <div style="position: relative;">
        <canvas id="game" width="400" height="600"></canvas>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="restart()">Play Again</button>
        </div>
    </div>
    <p class="instructions">Click or Press SPACE to flap</p>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let bird, pipes, score, gameLoop, gameRunning, groundOffset;
        
        function init() {
            bird = { x: 80, y: 250, vy: 0, size: 20 };
            pipes = [];
            score = 0;
            groundOffset = 0;
            gameRunning = true;
            document.getElementById('score').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
        }
        
        function draw() {
            // Sky
            ctx.fillStyle = '#70c5ce';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = '#ded264';
            ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
            ctx.fillStyle = '#54b435';
            ctx.fillRect(0, canvas.height - 80, canvas.width, 20);
            
            // Ground pattern
            ctx.fillStyle = '#4a9e2f';
            for (let i = -1; i < 15; i++) {
                const x = (i * 40 + groundOffset) % (canvas.width + 40) - 20;
                ctx.beginPath();
                ctx.moveTo(x, canvas.height - 60);
                ctx.lineTo(x + 20, canvas.height - 80);
                ctx.lineTo(x + 40, canvas.height - 60);
                ctx.fill();
            }
            
            // Pipes
            pipes.forEach(pipe => {
                ctx.fillStyle = '#73bf2e';
                ctx.fillRect(pipe.x, 0, 60, pipe.top);
                ctx.fillRect(pipe.x, canvas.height - 80 - pipe.bottom, 60, pipe.bottom);
                
                // Pipe caps
                ctx.fillStyle = '#5a9e24';
                ctx.fillRect(pipe.x - 5, pipe.top - 25, 70, 25);
                ctx.fillRect(pipe.x - 5, canvas.height - 80 - pipe.bottom, 70, 25);
            });
            
            // Bird
            ctx.fillStyle = '#ffd700';
            ctx.beginPath();
            ctx.ellipse(bird.x, bird.y, bird.size, bird.size - 5, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Bird eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(bird.x + 8, bird.y - 3, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(bird.x + 10, bird.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Bird beak
            ctx.fillStyle = '#ff6b35';
            ctx.beginPath();
            ctx.moveTo(bird.x + 15, bird.y);
            ctx.lineTo(bird.x + 25, bird.y + 3);
            ctx.lineTo(bird.x + 15, bird.y + 6);
            ctx.fill();
        }
        
        function update() {
            if (!gameRunning) return;
            
            bird.vy += 0.5;
            bird.y += bird.vy;
            groundOffset -= 3;
            
            // Create pipes
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
                const gap = 150;
                const top = Math.random() * 200 + 50;
                pipes.push({ x: canvas.width, top: top, bottom: canvas.height - 80 - top - gap });
            }
            
            // Move pipes
            pipes.forEach(pipe => pipe.x -= 3);
            pipes = pipes.filter(pipe => pipe.x > -60);
            
            // Collision
            if (bird.y > canvas.height - 80 - bird.size || bird.y < bird.size) {
                endGame();
            }
            
            pipes.forEach(pipe => {
                if (bird.x + bird.size > pipe.x && bird.x - bird.size < pipe.x + 60) {
                    if (bird.y - bird.size < pipe.top || bird.y + bird.size > canvas.height - 80 - pipe.bottom) {
                        endGame();
                    }
                }
            });
            
            // Score
            pipes.forEach(pipe => {
                if (!pipe.scored && pipe.x + 60 < bird.x) {
                    pipe.scored = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }
            });
        }
        
        function endGame() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function flap() {
            if (gameRunning) {
                bird.vy = -8;
            }
        }
        
        function restart() {
            init();
            gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
        }
        
        canvas.addEventListener('click', flap);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') flap();
        });
        
        init();
        gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
    </script>
</body>
</html>
