<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #fff; }
        h1 { color: #fbbf24; margin-bottom: 10px; }
        #score { font-size: 36px; color: #fbbf24; margin-bottom: 5px; }
        #cps { font-size: 18px; color: #888; margin-bottom: 20px; }
        canvas { cursor: pointer; transition: transform 0.1s; }
        canvas:hover { transform: scale(1.02); }
        canvas:active { transform: scale(0.95); }
        .upgrades { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .upgrade { background: #2a2a4e; padding: 15px 25px; border-radius: 12px; cursor: pointer; text-align: center; border: 2px solid #444; transition: all 0.2s; }
        .upgrade:hover { border-color: #fbbf24; transform: translateY(-3px); }
        .upgrade:disabled { opacity: 0.5; cursor: not-allowed; }
        .upgrade h3 { color: #fbbf24; margin-bottom: 5px; }
        .upgrade p { color: #888; font-size: 14px; }
        .upgrade .cost { color: #4ade80; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>🍪 COOKIE CLICKER</h1>
    <div id="score">0 cookies</div>
    <div id="cps">0 per second</div>
    <canvas id="cookie" width="300" height="300"></canvas>
    <div class="upgrades">
        <div class="upgrade" id="cursor" onclick="buyUpgrade('cursor')">
            <h3>👆 Cursor</h3>
            <p>Auto-clicks</p>
            <div class="cost"><span id="cursorCost">15</span> cookies</div>
            <p>Owned: <span id="cursorOwned">0</span></p>
        </div>
        <div class="upgrade" id="grandma" onclick="buyUpgrade('grandma')">
            <h3>👵 Grandma</h3>
            <p>Bakes cookies</p>
            <div class="cost"><span id="grandmaCost">100</span> cookies</div>
            <p>Owned: <span id="grandmaOwned">0</span></p>
        </div>
        <div class="upgrade" id="farm" onclick="buyUpgrade('farm')">
            <h3>🌾 Farm</h3>
            <p>Grows cookies</p>
            <div class="cost"><span id="farmCost">500</span> cookies</div>
            <p>Owned: <span id="farmOwned">0</span></p>
        </div>
        <div class="upgrade" id="factory" onclick="buyUpgrade('factory')">
            <h3>🏭 Factory</h3>
            <p>Mass produces</p>
            <div class="cost"><span id="factoryCost">2000</span> cookies</div>
            <p>Owned: <span id="factoryOwned">0</span></p>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('cookie');
        const ctx = canvas.getContext('2d');
        let cookies = 0, cps = 0;
        let upgrades = { cursor: { cost: 15, owned: 0, cps: 0.1 }, grandma: { cost: 100, owned: 0, cps: 1 }, farm: { cost: 500, owned: 0, cps: 5 }, factory: { cost: 2000, owned: 0, cps: 20 } };
        let particles = [];
        
        function drawCookie() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(155, 160, 100, 30, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Cookie
            ctx.fillStyle = '#c7840f';
            ctx.beginPath();
            ctx.arc(150, 150, 100, 0, Math.PI * 2);
            ctx.fill();
            
            // Chocolate chips
            ctx.fillStyle = '#4a2c0a';
            const chips = [[100,100],[180,90],[120,160],[170,170],[90,150],[150,120],[130,180]];
            chips.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.ellipse(x, y, 12, 8, Math.random(), 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Highlight
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath();
            ctx.arc(110, 110, 40, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawParticles() {
            particles.forEach((p, i) => {
                ctx.fillStyle = `rgba(251, 191, 36, ${p.life/30})`;
                ctx.font = 'bold 20px Arial';
                ctx.fillText('+' + p.amount, p.x, p.y);
                p.y -= 2;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);
        }
        
        function update() {
            cps = upgrades.cursor.owned * 0.1 + upgrades.grandma.owned * 1 + upgrades.farm.owned * 5 + upgrades.factory.owned * 20;
            cookies += cps / 60;
            document.getElementById('score').textContent = Math.floor(cookies) + ' cookies';
            document.getElementById('cps').textContent = cps.toFixed(1) + ' per second';
            
            // Update upgrade buttons
            Object.keys(upgrades).forEach(key => {
                document.getElementById(key + 'Cost').textContent = Math.floor(upgrades[key].cost);
                document.getElementById(key + 'Owned').textContent = upgrades[key].owned;
                document.getElementById(key).disabled = cookies < upgrades[key].cost;
            });
        }
        
        function clickCookie(e) {
            cookies++;
            const rect = canvas.getBoundingClientRect();
            particles.push({ x: e.clientX - rect.left, y: e.clientY - rect.top - 20, life: 30, amount: 1 });
        }
        
        function buyUpgrade(type) {
            if (cookies >= upgrades[type].cost) {
                cookies -= upgrades[type].cost;
                upgrades[type].owned++;
                upgrades[type].cost = Math.floor(upgrades[type].cost * 1.15);
            }
        }
        
        canvas.addEventListener('click', clickCookie);
        
        function gameLoop() {
            update();
            drawCookie();
            drawParticles();
            requestAnimationFrame(gameLoop);
        }
        
        gameLoop();
    </script>
</body>
</html>
