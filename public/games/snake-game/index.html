<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #fff; }
        h1 { margin-bottom: 10px; color: #4ade80; }
        #score { font-size: 24px; margin-bottom: 20px; color: #fbbf24; }
        canvas { border: 4px solid #4ade80; border-radius: 8px; background: #0f0f1a; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px 50px; border-radius: 16px; text-align: center; display: none; }
        #gameOver h2 { color: #ef4444; font-size: 32px; margin-bottom: 10px; }
        #gameOver p { font-size: 18px; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 18px; background: #4ade80; border: none; border-radius: 8px; cursor: pointer; color: #000; font-weight: bold; }
        button:hover { background: #22c55e; }
        .instructions { margin-top: 15px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🐍 SNAKE GAME</h1>
    <div id="score">Score: 0</div>
    <div style="position: relative;">
        <canvas id="game" width="400" height="400"></canvas>
        <div id="gameOver">
            <h2>Game Over!</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button onclick="restart()">Play Again</button>
        </div>
    </div>
    <p class="instructions">Use Arrow Keys or WASD to move</p>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const size = 20;
        let snake, food, direction, score, gameLoop, speed;
        
        function init() {
            snake = [{x: 200, y: 200}];
            direction = {x: 0, y: 0};
            score = 0;
            speed = 100;
            placeFood();
            document.getElementById('score').textContent = 'Score: 0';
            document.getElementById('gameOver').style.display = 'none';
        }
        
        function placeFood() {
            food = { x: Math.floor(Math.random() * (canvas.width / size)) * size, y: Math.floor(Math.random() * (canvas.height / size)) * size };
        }
        
        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(food.x + size/2, food.y + size/2, size/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            snake.forEach((part, i) => {
                ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
                ctx.fillRect(part.x, part.y, size - 2, size - 2);
            });
        }
        
        function update() {
            const head = {x: snake[0].x + direction.x * size, y: snake[0].y + direction.y * size};
            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height || snake.some(p => p.x === head.x && p.y === head.y)) {
                gameOver();
                return;
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = 'Score: ' + score;
                placeFood();
                if (speed > 50) speed -= 2;
            } else {
                snake.pop();
            }
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
        }
        
        function restart() {
            init();
            gameLoop = setInterval(() => { update(); draw(); }, speed);
        }
        
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'ArrowUp' || e.key === 'w') && direction.y === 0) direction = {x: 0, y: -1};
            if ((e.key === 'ArrowDown' || e.key === 's') && direction.y === 0) direction = {x: 0, y: 1};
            if ((e.key === 'ArrowLeft' || e.key === 'a') && direction.x === 0) direction = {x: -1, y: 0};
            if ((e.key === 'ArrowRight' || e.key === 'd') && direction.x === 0) direction = {x: 1, y: 0};
        });
        
        init();
        gameLoop = setInterval(() => { update(); draw(); }, speed);
    </script>
</body>
</html>
