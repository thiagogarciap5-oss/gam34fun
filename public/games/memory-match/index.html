<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #fff; }
        h1 { color: #a855f7; margin-bottom: 10px; }
        #score { font-size: 24px; color: #fbbf24; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 100px); gap: 15px; }
        .card { width: 100px; height: 100px; background: #2a2a4e; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 48px; transition: all 0.3s; border: 3px solid #444; }
        .card:hover { transform: scale(1.05); }
        .card.flipped { background: #3a3a5e; border-color: #a855f7; }
        .card.matched { background: #22c55e; border-color: #22c55e; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px 50px; border-radius: 16px; text-align: center; display: none; }
        #gameOver h2 { color: #a855f7; font-size: 32px; margin-bottom: 10px; }
        #gameOver p { font-size: 20px; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 18px; background: #a855f7; border: none; border-radius: 8px; cursor: pointer; color: #fff; font-weight: bold; }
        button:hover { background: #9333ea; }
        .instructions { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🧠 MEMORY MATCH</h1>
    <div id="score">Moves: 0 | Pairs: 0/8</div>
    <div class="grid" id="grid"></div>
    <div id="gameOver">
        <h2>🎉 You Won!</h2>
        <p>Moves: <span id="finalMoves">0</span></p>
        <button onclick="restart()">Play Again</button>
    </div>
    <p class="instructions">Find all matching pairs!</p>
    <script>
        const emojis = ['🍎', '🍕', '🎮', '🚀', '⭐', '🎸', '🏀', '🌟'];
        let cards = [], flipped = [], matched = 0, moves = 0, canFlip = true;
        
        function init() {
            cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
            flipped = [];
            matched = 0;
            moves = 0;
            canFlip = true;
            document.getElementById('gameOver').style.display = 'none';
            updateScore();
            render();
        }
        
        function updateScore() {
            document.getElementById('score').textContent = 'Moves: ' + moves + ' | Pairs: ' + matched + '/8';
        }
        
        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            cards.forEach((emoji, i) => {
                const card = document.createElement('div');
                card.className = 'card' + (flipped.includes(i) || matched === emojis.indexOf(emoji) + emojis.indexOf(emoji) >= 0 ? ' flipped' : '');
                if (flipped.includes(i)) card.textContent = emoji;
                card.onclick = () => flip(i);
                grid.appendChild(card);
            });
        }
        
        function flip(i) {
            if (!canFlip || flipped.includes(i)) return;
            flipped.push(i);
            render();
            
            if (flipped.length === 2) {
                moves++;
                updateScore();
                canFlip = false;
                
                const [a, b] = flipped;
                if (cards[a] === cards[b]) {
                    // Match!
                    matched++;
                    updateScore();
                    flipped = [];
                    canFlip = true;
                    
                    // Mark as matched
                    const cardEls = document.querySelectorAll('.card');
                    cardEls[a].classList.add('matched');
                    cardEls[b].classList.add('matched');
                    
                    if (matched === 8) {
                        setTimeout(() => {
                            document.getElementById('finalMoves').textContent = moves;
                            document.getElementById('gameOver').style.display = 'block';
                        }, 500);
                    }
                } else {
                    // No match
                    setTimeout(() => {
                        flipped = [];
                        render();
                        canFlip = true;
                    }, 1000);
                }
            }
        }
        
        function restart() {
            init();
        }
        
        init();
    </script>
</body>
</html>
