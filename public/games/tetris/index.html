<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #fff; }
        h1 { color: #ff0055; margin-bottom: 10px; text-shadow: 0 0 20px #ff0055; }
        #score { font-size: 28px; color: #fbbf24; margin-bottom: 15px; }
        canvas { border: 3px solid #ff0055; border-radius: 4px; background: #0f0f1a; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 30px 50px; border-radius: 16px; text-align: center; display: none; border: 2px solid #ff0055; }
        #gameOver h2 { color: #ff0055; font-size: 32px; margin-bottom: 10px; }
        #gameOver p { font-size: 20px; margin-bottom: 20px; }
        button { padding: 12px 30px; font-size: 18px; background: #ff0055; border: none; border-radius: 8px; cursor: pointer; color: #fff; font-weight: bold; }
        button:hover { background: #cc0044; }
        .instructions { margin-top: 15px; color: #888; font-size: 14px; }
        #nextLabel { color: #4ade80; margin-top: 10px; }
        #nextCanvas { border: 2px solid #4ade80; border-radius: 4px; margin-top: 5px; }
        .game-container { display: flex; gap: 30px; align-items: flex-start; }
    </style>
</head>
<body>
    <h1>🧱 TETRIS</h1>
    <div id="score">Score: 0 | Lines: 0</div>
    <div class="game-container">
        <div style="position: relative;">
            <canvas id="game" width="300" height="600"></canvas>
            <div id="gameOver">
                <h2>GAME OVER!</h2>
                <p>Score: <span id="finalScore">0</span></p>
                <button onclick="restart()">Play Again</button>
            </div>
        </div>
        <div>
            <canvas id="nextCanvas" width="100" height="100"></canvas>
            <p id="nextLabel">Next:</p>
            <div style="margin-top: 20px; color: #888; font-size: 14px; text-align: center;">
                <p>⬆️ Rotate</p>
                <p>⬅️➡️ Move</p>
                <p>⬇️ Soft Drop</p>
                <p>Space: Hard Drop</p>
            </div>
        </div>
    </div>
    <p class="instructions">Use Arrow Keys to play</p>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10, ROWS = 20, SIZE = 30;
        const SHAPES = [
            [[1,1,1,1]], // I
            [[1,1],[1,1]], // O
            [[0,1,0],[1,1,1]], // T
            [[1,0,0],[1,1,1]], // L
            [[0,0,1],[1,1,1]], // J
            [[1,1,0],[0,1,1]], // S
            [[0,1,1],[1,1,0]]  // Z
        ];
        const COLORS = ['#00ffff', '#ffff00', '#ff00ff', '#ff8800', '#0000ff', '#00ff00', '#ff0000'];
        
        let board, current, nextPiece, score, lines, gameLoop, gameOver, dropInterval, lastDrop;
        
        function init() {
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            gameOver = false;
            dropInterval = 1000;
            lastDrop = Date.now();
            nextPiece = newPiece();
            current = { ...nextPiece, x: 4, y: 0 };
            nextPiece = newPiece();
            document.getElementById('score').textContent = 'Score: ' + score + ' | Lines: ' + lines;
            document.getElementById('gameOver').style.display = 'none';
            draw();
            drawNext();
        }
        
        function newPiece() {
            const idx = Math.floor(Math.random() * SHAPES.length);
            return { shape: SHAPES[idx], color: COLORS[idx], x: 0, y: 0 };
        }
        
        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = '#1a1a3e';
            for (let i = 0; i <= COLS; i++) ctx.strokeRect(i * SIZE, 0, SIZE, canvas.height);
            for (let i = 0; i <= ROWS; i++) ctx.strokeRect(0, i * SIZE, canvas.width, SIZE);
            
            // Board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        ctx.fillStyle = board[r][c];
                        ctx.fillRect(c * SIZE + 2, r * SIZE + 2, SIZE - 4, SIZE - 4);
                    }
                }
            }
            
            // Current piece
            if (current) {
                ctx.fillStyle = current.color;
                current.shape.forEach((row, ry) => {
                    row.forEach((cell, cx) => {
                        if (cell) ctx.fillRect((current.x + cx) * SIZE + 2, (current.y + ry) * SIZE + 2, SIZE - 4, SIZE - 4);
                    });
                });
            }
        }
        
        function drawNext() {
            nextCtx.fillStyle = '#0f0f1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            nextCtx.fillStyle = nextPiece.color;
            nextPiece.shape.forEach((row, ry) => {
                row.forEach((cell, cx) => {
                    if (cell) nextCtx.fillRect(cx * 25 + 10, ry * 25 + 10, 20, 20);
                });
            });
        }
        
        function collide(piece, offsetX, offsetY) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c]) {
                        const newX = piece.x + c + offsetX;
                        const newY = piece.y + r + offsetY;
                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        if (newY >= 0 && board[newY][newX]) return true;
                    }
                }
            }
            return false;
        }
        
        function merge() {
            current.shape.forEach((row, ry) => {
                row.forEach((cell, cx) => {
                    if (cell) {
                        const y = current.y + ry;
                        const x = current.x + cx;
                        if (y >= 0) board[y][x] = current.color;
                    }
                });
            });
        }
        
        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== 0)) {
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(0));
                    cleared++;
                    r++;
                }
            }
            if (cleared > 0) {
                lines += cleared;
                score += [0, 100, 300, 500, 800][cleared] * (Math.floor(lines / 10) + 1);
                dropInterval = Math.max(100, 1000 - Math.floor(lines / 5) * 50);
                document.getElementById('score').textContent = 'Score: ' + score + ' | Lines: ' + lines;
            }
        }
        
        function rotate() {
            const rotated = current.shape[0].map((_, i) => current.shape.map(row => row[i]).reverse());
            const prev = current.shape;
            current.shape = rotated;
            if (collide(current, 0, 0)) current.shape = prev;
        }
        
        function update() {
            if (gameOver) return;
            
            if (Date.now() - lastDrop > dropInterval) {
                if (!collide(current, 0, 1)) {
                    current.y++;
                } else {
                    merge();
                    clearLines();
                    current = { ...nextPiece, x: 4, y: 0 };
                    nextPiece = newPiece();
                    drawNext();
                    if (collide(current, 0, 0)) {
                        gameOver = true;
                        document.getElementById('finalScore').textContent = score;
                        document.getElementById('gameOver').style.display = 'block';
                    }
                }
                lastDrop = Date.now();
            }
            draw();
        }
        
        function move(dir) {
            if (!collide(current, dir, 0)) current.x += dir;
            draw();
        }
        
        function drop() {
            while (!collide(current, 0, 1)) current.y++;
            update();
        }
        
        function softDrop() {
            if (!collide(current, 0, 1)) {
                current.y++;
                score += 1;
            }
            draw();
        }
        
        function restart() {
            init();
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') rotate();
            if (e.key === 'ArrowLeft') move(-1);
            if (e.key === 'ArrowRight') move(1);
            if (e.key === 'ArrowDown') softDrop();
            if (e.key === ' ') { e.preventDefault(); drop(); }
        });
        
        init();
        gameLoop = setInterval(update, 1000/60);
    </script>
</body>
</html>
