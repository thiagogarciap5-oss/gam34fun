<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; color: #fff; }
        h1 { color: #4ade80; margin-bottom: 10px; }
        #score { font-size: 32px; margin-bottom: 20px; }
        canvas { border: 3px solid #4ade80; border-radius: 8px; background: #0f0f1a; }
        .instructions { margin-top: 15px; color: #888; font-size: 14px; }
        #startMsg { position: absolute; font-size: 24px; color: #4ade80; }
    </style>
</head>
<body>
    <h1>🏓 PONG</h1>
    <div id="score">0 - 0</div>
    <div style="position: relative;">
        <canvas id="game" width="800" height="400"></canvas>
    </div>
    <p class="instructions">W/S or Arrow Keys to move. First to 11 wins!</p>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const PADDLE_H = 80, PADDLE_W = 12, BALL = 12;
        let paddle1, paddle2, ball, score1, score2, gameLoop, gameRunning;
        
        function init() {
            paddle1 = { x: 20, y: 160 };
            paddle2 = { x: 768, y: 160 };
            ball = { x: 400, y: 200, vx: 5, vy: 3 };
            score1 = 0, score2 = 0;
            gameRunning = true;
            updateScore();
        }
        
        function updateScore() {
            document.getElementById('score').textContent = score1 + ' - ' + score2;
        }
        
        function draw() {
            ctx.fillStyle = '#0f0f1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Center line
            ctx.strokeStyle = '#333';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width/2, 0);
            ctx.lineTo(canvas.width/2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Paddles
            ctx.fillStyle = '#4ade80';
            ctx.fillRect(paddle1.x, paddle1.y, PADDLE_W, PADDLE_H);
            ctx.fillRect(paddle2.x, paddle2.y, PADDLE_W, PADDLE_H);
            
            // Ball
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function update() {
            if (!gameRunning) return;
            
            ball.x += ball.vx;
            ball.y += ball.vy;
            
            // Top/bottom bounce
            if (ball.y - BALL < 0 || ball.y + BALL > canvas.height) {
                ball.vy *= -1;
            }
            
            // Paddle collision
            if (ball.x - BALL < paddle1.x + PADDLE_W && ball.y > paddle1.y && ball.y < paddle1.y + PADDLE_H) {
                ball.vx = Math.abs(ball.vx) * 1.05;
                ball.vy += (ball.y - (paddle1.y + PADDLE_H/2)) * 0.1;
            }
            if (ball.x + BALL > paddle2.x && ball.y > paddle2.y && ball.y < paddle2.y + PADDLE_H) {
                ball.vx = -Math.abs(ball.vx) * 1.05;
                ball.vy += (ball.y - (paddle2.y + PADDLE_H/2)) * 0.1;
            }
            
            // Score
            if (ball.x < 0) {
                score2++;
                updateScore();
                resetBall();
            }
            if (ball.x > canvas.width) {
                score1++;
                updateScore();
                resetBall();
            }
            
            // Win condition
            if (score1 >= 11 || score2 >= 11) {
                gameRunning = false;
                setTimeout(() => {
                    alert((score1 >= 11 ? 'Player 1' : 'Player 2') + ' Wins!');
                    init();
                }, 100);
            }
        }
        
        function resetBall() {
            ball.x = 400;
            ball.y = 200;
            ball.vx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.vy = (Math.random() - 0.5) * 6;
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') paddle2.y -= 15;
            if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') paddle2.y += 15;
        });
        
        // Simple AI for paddle 1
        setInterval(() => {
            if (ball.vx < 0) {
                if (ball.y < paddle1.y + PADDLE_H/2) paddle1.y -= 5;
                if (ball.y > paddle1.y + PADDLE_H/2) paddle1.y += 5;
            }
            paddle1.y = Math.max(0, Math.min(canvas.height - PADDLE_H, paddle1.y));
            paddle2.y = Math.max(0, Math.min(canvas.height - PADDLE_H, paddle2.y));
        }, 16);
        
        init();
        gameLoop = setInterval(() => { update(); draw(); }, 1000/60);
    </script>
</body>
</html>
